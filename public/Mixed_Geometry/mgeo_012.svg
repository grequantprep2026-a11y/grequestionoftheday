<svg width="100%" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Horizontal line -->
  <line x1="100" y1="280" x2="580" y2="280" stroke="black" stroke-width="1.8"
        marker-start="url(#arr)" marker-end="url(#arr)"/>

  <!-- Vertical OB -->
  <line x1="320" y1="280" x2="320" y2="100" stroke="black" stroke-width="1.8"/>

  <!-- Quarter arc A to B -->
  <path d="M 160 280 A 160 160 0 0 1 320 120" fill="none" stroke="black" stroke-width="1.8"/>

  <!-- Ray 1: steep ~70° -->
  <line x1="320" y1="280" x2="378" y2="98" stroke="black" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Ray 2: gentle ~25° -->
  <line x1="320" y1="280" x2="510" y2="204" stroke="black" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Dots -->
  <circle cx="160" cy="280" r="3" fill="black"/>
  <circle cx="320" cy="280" r="3" fill="black"/>

  <!-- Labels -->
  <text x="313" y="90" font-size="14" font-style="italic" font-family="Arial">B</text>
  <text x="145" y="304" font-size="14" font-style="italic" font-family="Arial">A</text>
  <text x="310" y="304" font-size="14" font-style="italic" font-family="Arial">O</text>

  <!-- Angle labels -->
  <text x="334" y="190" font-size="12" font-style="italic" font-family="Arial">2x°</text>
  <text x="368" y="238" font-size="12" font-style="italic" font-family="Arial">3x°</text>
  <text x="430" y="272" font-size="12" font-style="italic" font-family="Arial">x°</text>

</svg>