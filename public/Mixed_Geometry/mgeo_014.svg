  <text x="254" y="258" font-size="14" font-style="italic" font-family="Arial">W</text>
  <text x="498" y="258" font-size="14" font-style="italic" font-family="Arial">X</text>
  <text x="624" y="258" font-size="14" font-style="italic" font-family="Arial">D</text>

