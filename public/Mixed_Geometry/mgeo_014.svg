  <text x="154" y="92" font-size="14" font-style="italic" font-family="Arial">Y</text>
  <text x="394" y="92" font-size="14" font-style="italic" font-family="Arial">Z</text>
  <text x="624" y="96" font-size="14" font-style="italic" font-family="Arial">C</text>

  <!-- Bottom labels -->
