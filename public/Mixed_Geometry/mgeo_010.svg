<svg width="100%" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- l1 vertical -->
  <line x1="230" y1="430" x2="230" y2="30" stroke="black" stroke-width="1.8" marker-start="url(#arr)" marker-end="url(#arr)"/>

  <!-- l2 vertical -->
  <line x1="420" y1="430" x2="420" y2="30" stroke="black" stroke-width="1.8" marker-start="url(#arr)" marker-end="url(#arr)"/>

  <!-- Transversal diagonal -->
  <line x1="100" y1="380" x2="580" y2="80" stroke="black" stroke-width="1.8" marker-start="url(#arr)" marker-end="url(#arr)"/>

  <!-- Angles at l1 -->
  <text x="193" y="295" font-size="12" font-style="italic" font-family="Arial">a°</text>
  <text x="235" y="270" font-size="12" font-style="italic" font-family="Arial">b°</text>
  <text x="235" y="330" font-size="12" font-style="italic" font-family="Arial">c°</text>
  <text x="193" y="340" font-size="12" font-style="italic" font-family="Arial">d°</text>

  <!-- Angles at l2 -->
  <text x="383" y="176" font-size="12" font-style="italic" font-family="Arial">e°</text>
  <text x="425" y="150" font-size="12" font-style="italic" font-family="Arial">f°</text>
  <text x="425" y="192" font-size="12" font-style="italic" font-family="Arial">g°</text>
  <text x="383" y="220" font-size="12" font-style="italic" font-family="Arial">h°</text>

  <!-- Line labels -->
  <text x="218" y="462" font-size="14" font-style="italic" font-family="Arial">line l₁</text>
  <text x="408" y="462" font-size="14" font-style="italic" font-family="Arial">line l₂</text>

</svg>