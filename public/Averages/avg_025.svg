<svg width="500" height="250" viewBox="0 0 500 250" xmlns="http://www.w3.org/2000/svg">
  <style>
    .axis-line { stroke: black; stroke-width: 2; fill: none; }
    .grid-line { stroke: #333; stroke-width: 1; }
    .bar { fill: #e0e0e0; stroke: #333; stroke-width: 1; }
    .label { font: 18px sans-serif; fill: black; text-anchor: middle; }
    .y-label { font: 18px sans-serif; fill: black; text-anchor: end; }
  </style>

  <text x="35" y="195" class="y-label">1</text>
  <text x="35" y="155" class="y-label">2</text>
  <text x="35" y="115" class="y-label">3</text>
  <text x="35" y="75" class="y-label">4</text>
  <text x="35" y="35" class="y-label">5</text>

  <rect x="50" y="50" width="70" height="160" class="bar" />
  <rect x="120" y="90" width="70" height="120" class="bar" />
  <rect x="190" y="50" width="70" height="160" class="bar" />
  <rect x="260" y="170" width="70" height="40" class="bar" />
  <rect x="330" y="130" width="70" height="80" class="bar" />
  <rect x="400" y="130" width="70" height="80" class="bar" />

  <line x1="50" y1="170" x2="470" y2="170" class="grid-line" />
  <line x1="50" y1="130" x2="470" y2="130" class="grid-line" />
  <line x1="50" y1="90" x2="470" y2="90" class="grid-line" />
  <line x1="50" y1="50" x2="470" y2="50" class="grid-line" />

  <rect x="50" y="10" width="420" height="200" class="axis-line" />

  <text x="85" y="235" class="label">110°</text>
  <text x="155" y="235" class="label">111°</text>
  <text x="225" y="235" class="label">112°</text>
  <text x="295" y="235" class="label">113°</text>
  <text x="365" y="235" class="label">114°</text>
  <text x="435" y="235" class="label">115°</text>
</svg>
