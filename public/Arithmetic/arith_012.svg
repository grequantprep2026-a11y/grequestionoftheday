<svg width="100%" viewBox="0 0 680 240" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Ticket Prices at the Natural History Museum</title>

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-size="15" font-weight="600" font-family="sans-serif" fill="#111">Ticket Prices at the Natural History Museum</text>

  <!-- Table outer border -->
  <rect x="40" y="45" width="600" height="170" rx="8" fill="white" stroke="#ccc" stroke-width="1"/>

  <!-- Header row background -->
  <rect x="40" y="45" width="600" height="40" rx="8" fill="#f5f5f5" stroke="none"/>
  <rect x="40" y="65" width="600" height="20" fill="#f5f5f5" stroke="none"/>

  <!-- Column dividers -->
  <line x1="300" y1="45" x2="300" y2="215" stroke="#ccc" stroke-width="0.5"/>
  <line x1="470" y1="45" x2="470" y2="215" stroke="#ccc" stroke-width="0.5"/>

  <!-- Row dividers -->
  <line x1="40" y1="85" x2="640" y2="85" stroke="#ccc" stroke-width="0.5"/>
  <line x1="40" y1="125" x2="640" y2="125" stroke="#ccc" stroke-width="0.5"/>
  <line x1="40" y1="165" x2="640" y2="165" stroke="#ccc" stroke-width="0.5"/>

  <!-- Header labels -->
  <text x="170" y="70" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" font-family="sans-serif" fill="#111">Category</text>
  <text x="385" y="70" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" font-family="sans-serif" fill="#111">Weekdays</text>
  <text x="555" y="55" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" font-family="sans-serif" fill="#111">Weekends</text>
  <text x="555" y="75" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" font-family="sans-serif" fill="#111">&amp; Holidays</text>

  <!-- Row: Child -->
  <text x="60" y="105" dominant-baseline="central" font-size="14" font-family="sans-serif" fill="#222">Child (5–18)</text>
  <text x="385" y="105" text-anchor="middle" dominant-baseline="central" font-size="14" font-family="sans-serif" fill="#222">$7</text>
  <text x="555" y="105" text-anchor="middle" dominant-baseline="central" font-size="14" font-family="sans-serif" fill="#222">$9</text>

  <!-- Row: Adult -->
  <text x="60" y="145" dominant-baseline="central" font-size="14" font-family="sans-serif" fill="#222">Adult (19–64)</text>
  <text x="385" y="145" text-anchor="middle" dominant-baseline="central" font-size="14" font-family="sans-serif" fill="#222">$14</text>
  <text x="555" y="145" text-anchor="middle" dominant-baseline="central" font-size="14" font-family="sans-serif" fill="#222">$16</text>

  <!-- Row: Senior -->
  <text x="60" y="185" dominant-baseline="central" font-size="14" font-family="sans-serif" fill="#222">Senior (65+)</text>
  <text x="385" y="185" text-anchor="middle" dominant-baseline="central" font-size="14" font-family="sans-serif" fill="#222">$8</text>
  <text x="555" y="185" text-anchor="middle" dominant-baseline="central" font-size="14" font-family="sans-serif" fill="#222">$10</text>
</svg>