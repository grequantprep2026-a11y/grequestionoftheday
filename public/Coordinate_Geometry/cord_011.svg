<svg width="100%" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- X axis -->
  <line x1="80" y1="260" x2="580" y2="260"
        stroke="black" stroke-width="1.4"
        marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text font-size="16" font-family="sans-serif" x="588" y="265">x</text>

  <!-- Y axis -->
  <line x1="330" y1="460" x2="330" y2="30"
        stroke="black" stroke-width="1.4"
        marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text font-size="16" font-family="sans-serif" x="326" y="22" text-anchor="middle">y</text>

  <!-- Parabola: left of y-axis, right arm on y-axis, both tips go straight up -->
  <path d="M 175,55 C 175,250 330,250 330,55"
        fill="none" stroke="black" stroke-width="1.5"/>

  <!-- Arrow left tip up -->
  <line x1="175" y1="100" x2="175" y2="52"
        stroke="black" stroke-width="1.5"
        marker-end="url(#arr)"/>

  <!-- Arrow right tip up (on y-axis) -->
  <line x1="330" y1="100" x2="330" y2="52"
        stroke="black" stroke-width="1.5"
        marker-end="url(#arr)"/>

</svg>