<svg width="100%" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- X axis -->
  <line x1="80" y1="235" x2="580" y2="235"
        stroke="black" stroke-width="1.4"
        marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text font-size="16" font-family="sans-serif" x="588" y="240">x</text>

  <!-- Y axis -->
  <line x1="295" y1="450" x2="295" y2="30"
        stroke="black" stroke-width="1.4"
        marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text font-size="16" font-family="sans-serif" x="291" y="22" text-anchor="middle">y</text>

  <!-- line m: upper-left to lower-right, steep negative slope -->
  <line x1="183" y1="68" x2="452" y2="402"
        stroke="black" stroke-width="1.4"
        marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text font-size="13" font-family="sans-serif" x="458" y="410">line m</text>

</svg>