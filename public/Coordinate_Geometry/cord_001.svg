<svg width="360" height="260" viewBox="0 0 360 260" xmlns="http://www.w3.org/2000/svg">

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4"
            orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,4 L0,8 Z" fill="black"/>
    </marker>
  </defs>

  <!-- X-axis -->
  <line x1="30" y1="130" x2="330" y2="130"
        stroke="black" stroke-width="2"
        marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="335" y="135" font-size="14">x</text>

  <!-- Y-axis -->
  <line x1="180" y1="20" x2="180" y2="240"
        stroke="black" stroke-width="2"
        marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="185" y="15" font-size="14">y</text>

  <!-- Line l1 (gentle negative slope) -->
  <line x1="60" y1="40" x2="320" y2="200"
        stroke="black" stroke-width="2"
        marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="270" y="205" font-size="13">line l₁</text>

  <!-- Line l2 (shifted LEFT of y-axis) -->
  <line x1="100" y1="20" x2="200" y2="240"
        stroke="black" stroke-width="2"
        marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="210" y="235" font-size="13">line l₂</text>

</svg>