<svg width="450" height="180" viewBox="0 0 450 180" xmlns="http://www.w3.org/2000/svg">
  <style>
    .header-text { font: bold 16px serif; fill: black; }
    .cell-text { font: 16px serif; fill: black; }
    .percent-text { font: 16px serif; fill: black; text-anchor: middle; }
    .border { stroke: black; stroke-width: 1.5; fill: none; }
    .header-bg { fill: #e0e0e0; stroke: black; stroke-width: 1.5; }
    .grid-line { stroke: black; stroke-width: 1; }
  </style>

  <rect x="20" y="20" width="410" height="140" class="border" />

  <rect x="20" y="20" width="410" height="35" class="header-bg" />

  <line x1="300" y1="20" x2="300" y2="160" class="grid-line" />

  <line x1="20" y1="55" x2="430" y2="55" class="grid-line" />
  <line x1="20" y1="90" x2="430" y2="90" class="grid-line" />
  <line x1="20" y1="125" x2="430" y2="125" class="grid-line" />

  <text x="30" y="43" class="header-text">Conference Ticket Advance Discounts</text>

  <text x="70" y="78" class="cell-text">5-29 days in advance</text>
  <text x="365" y="78" class="percent-text">15%</text>

  <text x="65" y="113" class="cell-text">30-59 days in advance</text>
  <text x="365" y="113" class="percent-text">30%</text>

  <text x="65" y="148" class="cell-text">60-89 days in advance</text>
  <text x="365" y="148" class="percent-text">40%</text>
</svg>
