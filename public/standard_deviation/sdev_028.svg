<svg width="400" height="100" viewBox="0 0 400 100" xmlns="http://www.w3.org/2000/svg">
  <style>
    .boxplot-line {
      fill: none;
      stroke: black;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .box-rect {
      fill: none;
      stroke: black;
      stroke-width: 2.5;
      stroke-linejoin: round;
    }
  </style>

  <line x1="30" y1="50" x2="60" y2="50" class="boxplot-line" />
  <line x1="30" y1="35" x2="30" y2="65" class="boxplot-line" />

  <rect x="60" y="25" width="280" height="50" class="box-rect" />
  
  <line x1="250" y1="25" x2="250" y2="75" class="boxplot-line" />

  <line x1="340" y1="50" x2="370" y2="50" class="boxplot-line" />
  <line x1="370" y1="35" x2="370" y2="65" class="boxplot-line" />
</svg>
