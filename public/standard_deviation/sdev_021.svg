<svg width="500" height="250" viewBox="0 0 500 250" xmlns="http://www.w3.org/2000/svg">
  <style>
    .axis { stroke: black; stroke-width: 2; }
    .curve { fill: none; stroke: black; stroke-width: 2; }
    .shaded { fill: #c0c0c0; stroke: none; }
    .dashed { stroke: black; stroke-width: 1; stroke-dasharray: 4; }
    .label { font: 18px serif; fill: black; text-anchor: middle; }
    .caption { font: 14px serif; fill: black; }
  </style>

  <path d="M 180,210 L 180,105 Q 250,20 320,105 L 320,210 Z" class="shaded" />

  <path d="M 50,210 Q 150,210 180,105 Q 250,20 320,105 Q 350,210 450,210" class="curve" />

  <line x1="20" y1="210" x2="480" y2="210" class="axis" />

  <line x1="180" y1="105" x2="180" y2="210" class="dashed" />
  <line x1="320" y1="105" x2="320" y2="210" class="dashed" />

  <text x="180" y="235" class="label">500</text>
  <text x="320" y="235" class="label">600</text>
</svg>
