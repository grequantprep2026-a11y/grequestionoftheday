<svg width="400" height="100" viewBox="0 0 400 100" xmlns="http://www.w3.org/2000/svg">
  <style>
    .line { stroke: black; stroke-width: 2; marker-end: url(#arrow); marker-start: url(#arrow-rev); }
    .tick { stroke: black; stroke-width: 2; }
    .label { font: italic 16px serif; fill: black; text-anchor: middle; }
    .number { font: 16px serif; fill: black; text-anchor: middle; }
  </style>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" />
    </marker>
    <marker id="arrow-rev" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" />
    </marker>
  </defs>

  <line x1="20" y1="40" x2="380" y2="40" class="line" />

  <line x1="60" y1="30" x2="60" y2="50" class="tick" />
  <text x="60" y="75" class="number">0</text>

  <line x1="110" y1="30" x2="110" y2="50" class="tick" />
  <line x1="160" y1="30" x2="160" y2="50" class="tick" />
  <line x1="210" y1="30" x2="210" y2="50" class="tick" />

  <line x1="260" y1="30" x2="260" y2="50" class="tick" />
  <g transform="translate(260, 80)">
    <text x="0" y="0" class="label">∛p</text>
  </g>

  <line x1="310" y1="30" x2="310" y2="50" class="tick" />
  <text x="310" y="75" class="number">2</text>
</svg>
