<svg width="400" height="80" viewBox="0 0 400 80" xmlns="http://www.w3.org/2000/svg">
  <style>
    .axis { stroke: black; stroke-width: 2.5; }
    .tick { stroke: black; stroke-width: 2; }
    .label { font: italic 18px serif; fill: black; text-anchor: middle; }
    .zero { font: 18px serif; fill: black; text-anchor: middle; }
  </style>

  <line x1="50" y1="30" x2="350" y2="30" class="axis" />

  <line x1="60" y1="20" x2="60" y2="40" class="tick" />
  <text x="60" y="65" class="zero">0</text>

  <line x1="130" y1="20" x2="130" y2="40" class="tick" />
  <text x="130" y="65" class="label">a</text>

  <line x1="200" y1="20" x2="200" y2="40" class="tick" />
  <text x="200" y="65" class="label">b</text>

  <line x1="270" y1="20" x2="270" y2="40" class="tick" />
  <text x="270" y="65" class="label">c</text>

  <line x1="340" y1="20" x2="340" y2="40" class="tick" />
  <text x="340" y="65" class="label">d</text>
</svg>
