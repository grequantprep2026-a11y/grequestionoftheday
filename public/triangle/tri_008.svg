<svg width="600" height="250" viewBox="0 0 600 250" xmlns="http://www.w3.org/2000/svg">
  <style>
    .outline { fill: none; stroke: black; stroke-width: 2.2; stroke-linejoin: round; }
    .label-serif { font: italic 22px serif; fill: black; }
    .label-sans { font: 18px sans-serif; fill: black; text-anchor: middle; }
    .mark { fill: none; stroke: black; stroke-width: 1.2; }
  </style>

  <g transform="translate(50, 40)">
    <polygon points="0,180 200,180 100,6.2" class="outline" />
    
    <text x="35" y="165" class="label-sans">60°</text>
    <text x="100" y="70" class="label-sans">60°</text>
    <text x="165" y="165" class="label-sans">x°</text>
    
    <text x="-10" y="200" class="label-serif">A</text>
    <text x="92" y="-10" class="label-serif">B</text>
    <text x="210" y="200" class="label-serif">C</text>
    
    <text x="155" y="110" class="label-sans">9</text>
  </g>

  <g transform="translate(350, 40)">
    <polygon points="0,180 220,180 0,60" class="outline" />
    
    <rect x="0" y="165" width="15" height="15" class="outline" />
    
    <text x="-15" y="110" class="label-sans">5</text>
    <text x="110" y="200" class="label-sans">12</text>
    
    <text x="-10" y="200" class="label-serif">D</text>
    <text x="-10" y="50" class="label-serif">E</text>
    <text x="230" y="200" class="label-serif">F</text>
  </g>
</svg>
