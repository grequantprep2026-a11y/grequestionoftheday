<svg width="250" height="250" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <style>
    .solid { stroke: black; stroke-width: 1.5; fill: none; }
    .dashed { stroke: black; stroke-width: 1.5; fill: none; stroke-dasharray: 4,4; }
    .label { font: italic 14px serif; fill: black; text-anchor: middle; }
    .dim { font: 12px serif; fill: black; text-anchor: middle; }
  </style>

  <polygon points="10,80 70,80 50,15" class="solid" />

  <line x1="50" y1="15" x2="50" y2="80" class="dashed" /> <polyline points="50,70 60,70 60,80" class="solid" /> <line x1="10" y1="90" x2="70" y2="90" stroke="black" stroke-width="1.2" />
  <line x1="10" y1="88" x2="10" y2="92" stroke="black" stroke-width="2" /> <line x1="70" y1="88" x2="70" y2="92" stroke="black" stroke-width="2" /> <text x="5" y="85" class="label">D</text>
  <text x="75" y="85" class="label">F</text>
  <text x="50" y="10" class="label">E</text>

  <text x="40" y="102" class="dim">8</text> <text x="45" y="55" class="dim">6</text> <text x="25" y="45" class="dim">9</text> </svg>
