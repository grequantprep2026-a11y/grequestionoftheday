<svg width="300" height="340" viewBox="0 0 300 340" xmlns="http://www.w3.org/2000/svg">

  <!-- Vertices:
       B = (150, 18)
       A = (30,  310)
       C = (270, 310)
       D = on AB at y=185 => (81.4, 185)
       E = on BC at y=185 => (218.6, 185)
  -->

  <!-- Left side: B to A -->
  <line x1="150"   y1="18"  x2="30"   y2="310" stroke="black" stroke-width="1.3"/>
  <!-- Right side: B to C -->
  <line x1="150"   y1="18"  x2="270"  y2="310" stroke="black" stroke-width="1.3"/>
  <!-- Base: A to C -->
  <line x1="30"    y1="310" x2="270"  y2="310" stroke="black" stroke-width="1.3"/>

  <!-- Midsegment DE — endpoints exactly ON triangle sides -->
  <line x1="81.4"  y1="185" x2="218.6" y2="185" stroke="black" stroke-width="1.3"/>

  <!-- Vertex labels -->
  <text x="143" y="12"  font-family="sans-serif" font-size="13" font-weight="bold" fill="black">B</text>
  <text x="14"  y="326" font-family="sans-serif" font-size="13" font-weight="bold" fill="black">A</text>
  <text x="273" y="326" font-family="sans-serif" font-size="13" font-weight="bold" fill="black">C</text>

  <!-- D label just left of point -->
  <text x="58"  y="182" font-family="sans-serif" font-size="13" font-weight="bold" fill="black">D</text>
  <!-- E label just right of point -->
  <text x="222" y="182" font-family="sans-serif" font-size="13" font-weight="bold" fill="black">E</text>

</svg>