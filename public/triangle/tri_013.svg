<svg width="400" height="320" viewBox="0 0 400 320" xmlns="http://www.w3.org/2000/svg">

  <!-- Triangle vertices:
       A = bottom-left   (30, 280)
       B = top-right     (280, 25)
       C = bottom-right  (280, 245)
  -->

  <!-- Triangle sides -->
  <line x1="30"  y1="280" x2="280" y2="25"  stroke="black" stroke-width="1.5"/>
  <line x1="280" y1="25"  x2="280" y2="245" stroke="black" stroke-width="1.5"/>
  <line x1="280" y1="245" x2="30"  y2="280" stroke="black" stroke-width="1.5"/>

  <!-- Angle label 45° near B (inside triangle, below-left of B) -->
  <text x="225" y="115" font-family="sans-serif" font-size="14" fill="black">45°</text>

  <!-- Angle label 37° near A (inside triangle, right of A) -->
  <text x="62" y="268" font-family="sans-serif" font-size="14" fill="black">37°</text>

  <!-- Vertex labels -->
  <text x="286" y="22"  font-family="sans-serif" font-size="15" font-weight="bold" fill="black">B</text>
  <text x="10"  y="295" font-family="sans-serif" font-size="15" font-weight="bold" fill="black">A</text>
  <text x="286" y="258" font-family="sans-serif" font-size="15" font-weight="bold" fill="black">C</text>

</svg>