<svg width="400" height="250" viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">

  <!-- Main triangle: X -> Y -> Z -->
  <line x1="20"  y1="210" x2="320" y2="30"  stroke="black" stroke-width="1.5"/>
  <line x1="20"  y1="210" x2="220" y2="210" stroke="black" stroke-width="1.5"/>
  <line x1="220" y1="210" x2="320" y2="30"  stroke="black" stroke-width="1.5"/>

  <!-- Dashed vertical: Y down to W -->
  <line x1="320" y1="30"  x2="320" y2="210" stroke="black" stroke-width="1.2" stroke-dasharray="6,4"/>

  <!-- Dashed horizontal: Z to W -->
  <line x1="220" y1="210" x2="320" y2="210" stroke="black" stroke-width="1.2" stroke-dasharray="6,4"/>

  <!-- Right angle box at W -->
  <polyline points="308,210 308,198 320,198" fill="none" stroke="black" stroke-width="1.2"/>

  <!-- Label "5" along XY line -->
  <text x="248" y="118" font-family="sans-serif" font-size="14" fill="black">5</text>

  <!-- Vertex labels -->
  <text x="5"   y="218" font-family="sans-serif" font-size="14" font-weight="bold" fill="black">X</text>
  <text x="326" y="34"  font-family="sans-serif" font-size="14" font-weight="bold" fill="black">Y</text>
  <text x="218" y="228" font-family="sans-serif" font-size="14" font-weight="bold" fill="black">Z</text>
  <text x="326" y="218" font-family="sans-serif" font-size="14" font-weight="bold" fill="black">W</text>

</svg>