<svg width="420" height="240" viewBox="0 0 420 240" xmlns="http://www.w3.org/2000/svg">

  <!-- Vertices:
       A = bottom-left    (25,  200)
       B = bottom-center  (195, 200)
       C = bottom-right   (375, 200)
       D = top-right      (285, 28)
  -->

  <!-- Base line A to C -->
  <line x1="25"  y1="200" x2="375" y2="200" stroke="black" stroke-width="1.4"/>

  <!-- AD -->
  <line x1="25"  y1="200" x2="285" y2="28"  stroke="black" stroke-width="1.4"/>

  <!-- BD -->
  <line x1="195" y1="200" x2="285" y2="28"  stroke="black" stroke-width="1.4"/>

  <!-- DC -->
  <line x1="285" y1="28"  x2="375" y2="200" stroke="black" stroke-width="1.4"/>

  <!-- Vertex labels -->
  <text x="8"   y="218" font-family="sans-serif" font-size="14" font-weight="bold" fill="black">A</text>
  <text x="188" y="218" font-family="sans-serif" font-size="14" font-weight="bold" fill="black">B</text>
  <text x="372" y="218" font-family="sans-serif" font-size="14" font-weight="bold" fill="black">C</text>
  <text x="286" y="20"  font-family="sans-serif" font-size="14" font-weight="bold" fill="black">D</text>

  <!-- Angle labels -->
  <!-- x° at A -->
  <text x="55"  y="192" font-family="sans-serif" font-size="13" fill="black">x°</text>

  <!-- 2x° at B inside left -->
  <text x="162" y="192" font-family="sans-serif" font-size="13" fill="black">2x°</text>

  <!-- 2x° at C inside left -->
  <text x="318" y="192" font-family="sans-serif" font-size="13" fill="black">2x°</text>

</svg>