<svg width="370" height="300" viewBox="0 0 370 300" xmlns="http://www.w3.org/2000/svg">

  <!-- Vertices:
       B = top-center     (185, 22)
       A = bottom-left    (38,  265)
       C = bottom-right   (332, 265)
       D = on BA at 55%   (104, 155)
       E = on BC at 55%   (266, 155)
  -->

  <!-- Triangle sides -->
  <line x1="185" y1="22"  x2="38"  y2="265" stroke="black" stroke-width="1.4"/>
  <line x1="185" y1="22"  x2="332" y2="265" stroke="black" stroke-width="1.4"/>
  <line x1="38"  y1="265" x2="332" y2="265" stroke="black" stroke-width="1.4"/>

  <!-- Midsegment DE exactly on triangle sides -->
  <line x1="104" y1="155" x2="266" y2="155" stroke="black" stroke-width="1.4"/>

  <!-- Vertex labels -->
  <text x="178" y="14"  font-family="sans-serif" font-size="14" font-weight="bold" fill="black">B</text>
  <text x="20"  y="282" font-family="sans-serif" font-size="14" font-weight="bold" fill="black">A</text>
  <text x="335" y="282" font-family="sans-serif" font-size="14" font-weight="bold" fill="black">C</text>

  <!-- D label just left of D point -->
  <text x="80"  y="153" font-family="sans-serif" font-size="14" font-weight="bold" fill="black">D</text>

  <!-- E label just right of E point -->
  <text x="270" y="153" font-family="sans-serif" font-size="14" font-weight="bold" fill="black">E</text>

</svg>