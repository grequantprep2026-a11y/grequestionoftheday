<svg width="420" height="290" viewBox="0 0 420 290" xmlns="http://www.w3.org/2000/svg">

  <!-- Vertices:
       W = top, left of center   (175, 18)
       X = bottom-left           (25,  255)
       Y = bottom, center        (210, 255)
       Z = bottom-right          (395, 255)
  -->

  <!-- Main triangle X -> W -> Z -> X -->
  <line x1="25"  y1="255" x2="175" y2="18"  stroke="black" stroke-width="1.5"/>
  <line x1="175" y1="18"  x2="395" y2="255" stroke="black" stroke-width="1.5"/>
  <line x1="25"  y1="255" x2="395" y2="255" stroke="black" stroke-width="1.5"/>

  <!-- Cevian W to Y — tilts left: W is at 175, Y is at 210, so line goes right-downward -->
  <line x1="175" y1="18"  x2="210" y2="255" stroke="black" stroke-width="1.5"/>

  <!-- Vertex labels -->
  <text x="170" y="13"  font-family="sans-serif" font-size="14" font-weight="bold" fill="black">W</text>
  <text x="8"   y="272" font-family="sans-serif" font-size="14" font-weight="bold" fill="black">X</text>
  <text x="204" y="272" font-family="sans-serif" font-size="14" font-weight="bold" fill="black">Y</text>
  <text x="398" y="272" font-family="sans-serif" font-size="14" font-weight="bold" fill="black">Z</text>

</svg>