<svg width="480" height="220" viewBox="0 0 480 220" xmlns="http://www.w3.org/2000/svg">

  <!-- Vertices:
       Top peak         (210, 35)
       Bottom-left      (30,  175)
       Bottom-right     (390, 175)
       Extended line goes further right to (450, 175)
  -->

  <!-- Full horizontal base line (extended both sides) -->
  <line x1="20"  y1="175" x2="460" y2="175" stroke="black" stroke-width="1.3"/>

  <!-- Left side: bottom-left to peak -->
  <line x1="30"  y1="175" x2="210" y2="35"  stroke="black" stroke-width="1.3"/>

  <!-- Right side: peak to bottom-right -->
  <line x1="210" y1="35"  x2="390" y2="175" stroke="black" stroke-width="1.3"/>

  <!-- Side labels -->
  <!-- "3" on left side -->
  <text x="100" y="98"  font-family="sans-serif" font-size="14" fill="black">3</text>

  <!-- "3" on right side -->
  <text x="308" y="98"  font-family="sans-serif" font-size="14" fill="black">3</text>

  <!-- Angle labels -->
  <!-- y° at bottom-left -->
  <text x="70"  y="165" font-family="sans-serif" font-size="13" fill="black">y°</text>

  <!-- 3x° at bottom-right (inside, left of right vertex) -->
  <text x="318" y="165" font-family="sans-serif" font-size="13" fill="black">3x°</text>

  <!-- 5y° outside to the right of right vertex -->
  <text x="398" y="165" font-family="sans-serif" font-size="13" fill="black">5y°</text>

</svg>