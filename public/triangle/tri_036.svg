<svg width="420" height="280" viewBox="0 0 420 280" xmlns="http://www.w3.org/2000/svg">

  <!-- Vertices:
       Top-left    = TL (55,  25)   — right angle corner
       Top-right   = TR (255, 25)   — where diagonal meets top, small right angle box
       Bottom-left = BL (55,  210)  — 45° + 45° angles
       Bottom-right= BR (385, 210)  — bottom-right corner
  -->

  <!-- Top horizontal: TL to TR (label x) -->
  <line x1="55"  y1="25"  x2="255" y2="25"  stroke="black" stroke-width="1.4"/>

  <!-- Left vertical: TL down to BL -->
  <line x1="55"  y1="25"  x2="55"  y2="210" stroke="black" stroke-width="1.4"/>

  <!-- Bottom: BL to BR -->
  <line x1="55"  y1="210" x2="385" y2="210" stroke="black" stroke-width="1.4"/>

  <!-- Right slanted: TR down to BR -->
  <line x1="255" y1="25"  x2="385" y2="210" stroke="black" stroke-width="1.4"/>

  <!-- Diagonal: BL to TR -->
  <line x1="55"  y1="210" x2="255" y2="25"  stroke="black" stroke-width="1.4"/>

  <!-- Right angle box at TL (top-left) -->
  <polyline points="55,39 69,39 69,25"
            fill="none" stroke="black" stroke-width="1.2"/>

  <!-- Right angle box at TR (where diagonal meets top line)
       Diagonal goes from BL(55,210) to TR(255,25)
       angle of diagonal = atan2(25-210, 255-55) = atan2(-185,200) = -42.7 deg -->
  <g transform="translate(255,25) rotate(-43)">
    <rect x="-12" y="0" width="12" height="12"
          fill="white" stroke="black" stroke-width="1.2"/>
  </g>

  <!-- Label x on top horizontal -->
  <text x="148" y="18"  font-family="sans-serif" font-size="14" fill="black">x</text>

  <!-- Label 10 on bottom -->
  <text x="205" y="235" font-family="sans-serif" font-size="14" fill="black">10</text>

  <!-- Angle labels at BL -->
  <!-- 45° upper (inside the rectangle triangle) -->
  <text x="65"  y="170" font-family="sans-serif" font-size="13" fill="black">45°</text>
  <!-- 45° lower (inside the lower triangle) -->
  <text x="80"  y="200" font-family="sans-serif" font-size="13" fill="black">45°</text>

</svg>