<svg width="320" height="280" viewBox="0 0 320 280" xmlns="http://www.w3.org/2000/svg">

  <!-- Vertices:
       B = top-center     (158, 22)
       A = bottom-left    (28,  245)
       C = bottom-right   (288, 245)
  -->

  <!-- AB left side -->
  <line x1="158" y1="22"  x2="28"  y2="245" stroke="black" stroke-width="1.4"/>

  <!-- BC right side -->
  <line x1="158" y1="22"  x2="288" y2="245" stroke="black" stroke-width="1.4"/>

  <!-- AC base -->
  <line x1="28"  y1="245" x2="288" y2="245" stroke="black" stroke-width="1.4"/>

  <!-- Label "15" on right side BC -->
  <text x="232" y="140" font-family="sans-serif" font-size="14" fill="black">15</text>

  <!-- Label "8" on base AC -->
  <text x="148" y="265" font-family="sans-serif" font-size="14" fill="black">8</text>

  <!-- Vertex labels -->
  <text x="150" y="15"  font-family="sans-serif" font-size="14" font-weight="bold" fill="black">B</text>
  <text x="12"  y="262" font-family="sans-serif" font-size="14" font-weight="bold" fill="black">A</text>
  <text x="292" y="262" font-family="sans-serif" font-size="14" font-weight="bold" fill="black">C</text>

</svg>